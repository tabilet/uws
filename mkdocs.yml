site_url: https://tabilet.github.io/uws/
repo_url: https://github.com/tabilet/uws
repo_name: tabilet/uws
docs_dir: docs
copyright: "© 2026 tabilet/uws · Udon Workflow Specification v1.0.0 · Apache 2.0"

